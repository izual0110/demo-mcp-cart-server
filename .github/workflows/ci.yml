name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '26'
          cache: maven

      - name: Run Maven tests
        run: ./demo-mcp-cart-server/mvnw -B -f demo-mcp-cart-server/pom.xml test
